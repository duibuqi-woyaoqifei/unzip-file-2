name: Android Release CI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      # [核心步骤]：自动签名 APK
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
          buildToolsVersion: "34.0.0"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.sign_app.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Release Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          mkdir -p publish
          cp ${{ steps.sign_app.outputs.signedReleaseFile }} publish/unzip-pro-latest.apk
          
          cd publish
          git init
          git checkout -b release-bin
          git add .
          git commit -m "release: update signed apk to ${GITHUB_REF_NAME}"
          git push -f https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} release-bin

      - name: Dispatch to Blog Repo
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          CDN_URL="https://fastly.jsdelivr.net/gh/${{ github.repository }}@release-bin/unzip-pro-latest.apk"
          
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.BLOG_REPO_TOKEN }}" \
            https://api.github.com/repos/duibuqi-woyaoqifei/jinlun-blog/dispatches \
            -d "{\"event_type\": \"version_update\", \"client_payload\": {\"version\": \"$VERSION\", \"url\": \"$CDN_URL\"}}"
