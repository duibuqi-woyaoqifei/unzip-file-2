name: Android Release CI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Manual Sign APK
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > release.jks
          BUILD_TOOLS_PATH=$(ls -d /usr/local/lib/android/sdk/build-tools/* | tail -1)
          echo "Using Build Tools from: $BUILD_TOOLS_PATH"
          RAW_APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          echo "Found raw APK: $RAW_APK"
          
          $BUILD_TOOLS_PATH/zipalign -v 4 "$RAW_APK" app-release-aligned.apk
          $BUILD_TOOLS_PATH/apksigner sign --ks release.jks \
            --ks-key-alias "${{ secrets.ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEY_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out app-release-signed.apk \
            app-release-aligned.apk
          
          ls -lh app-release-signed.apk

      # 使用 GitHub 官方 CLI 工具，避开第三方插件的上传重试限制
      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} app-release-signed.apk \
            --title "Release ${{ github.ref_name }}" \
            --notes "由 GitHub Actions 自动构建并签名的正式发行版。"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Release Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          mkdir -p publish
          cp app-release-signed.apk publish/unzip-pro-latest.apk
          
          cd publish
          git init
          git checkout -b release-bin
          git add .
          git commit -m "release: update signed apk to ${GITHUB_REF_NAME}"
          git push -f https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} release-bin

      - name: Dispatch to Blog Repo
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          CDN_URL="https://fastly.jsdelivr.net/gh/${{ github.repository }}@release-bin/unzip-pro-latest.apk"
          
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.BLOG_REPO_TOKEN }}" \
            https://api.github.com/repos/duibuqi-woyaoqifei/jinlun-blog/dispatches \
            -d "{\"event_type\": \"version_update\", \"client_payload\": {\"version\": \"$VERSION\", \"url\": \"$CDN_URL\"}}"
